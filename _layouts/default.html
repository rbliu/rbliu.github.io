<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <link rel="icon" href="{{ '/favicon-96x96.png' | relative_url }}" type="image/png">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="brand" href="{{ '/' | relative_url }}">
            <span class="brand__name">{{ site.author.name }}</span>
            <span class="brand__sub">{{ site.author.name_zh }}</span>
          </a>

          <nav class="nav" aria-label="Primary">
            {% for item in site.navigation %}
              <a
                class="nav__link{% if page.nav_key == item.key %} is-active{% endif %}"
                href="{{ item.url | relative_url }}"
              >
                {{ item.title }}
              </a>
            {% endfor %}
          </nav>
        </div>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="site-footer__inner">
          <p>{{ site.author.name }} · {{ site.author.title }} · {{ site.author.location }}</p>
        </div>
      </footer>
    </div>
  </body>
</html>
